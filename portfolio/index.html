<!DOCTYPE html>
<html lang="ko" data-bs-theme="auto">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - ahh</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="/assets/css/style.css">
  <script>
    (() => {
      const getPreferredTheme = () => {
        const storedTheme = localStorage.getItem('theme')
        if (storedTheme) return storedTheme
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      }
      document.documentElement.setAttribute('data-bs-theme', getPreferredTheme())
    })()
  </script>
</head>

<body class="d-flex flex-column h-100">
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand p-0" href="/">ahh</a>
      <div class="navbar-nav ms-auto flex-row">
        <a class="nav-link me-3" href="/about/">About</a>
        <a class="nav-link me-3" href="/portfolio/">Portfolio</a>
        <button class="btn btn-link nav-link p-0" id="theme-toggle" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-circle-half"
            viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 0 8 1v14zm0 1A8 8 0 1 1 8 0a8 8 0 0 1 0 16z" />
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="container mt-5 flex-shrink-0">
    <h1 class="fw-bold mb-4">Portfolio</h1>

    <section class="mb-5">
      <h2 class="h4 fw-bold mb-3">Sample Portfolio</h2>
      <p class="text-muted mb-4">These are screencaps from Chungking Express</p>

      <div id="portfolio-masonry" style="position: relative;"></div>

      <script type="module">
        import { prepare, layout } from '/assets/js/pretext.js';

        const GAP = 16;
        const CARD_PADDING_X = 16;
        const CARD_PADDING_TOP = 16;
        const CARD_PADDING_BOTTOM = 16;
        const CAPTION_MARGIN_TOP = 12;
        const CAPTION_LINE_HEIGHT = 22.4;
        const CAPTION_FONT = '500 14px "Pretendard Variable"';
        const portfolioItems = [
          {
            src: '/assets/images/sample_portfolio/1.jpg',
            alt: 'Chungking Express 1'
          },
          {
            src: '/assets/images/sample_portfolio/2.jpg',
            alt: 'Chungking Express 2'
          },
          {
            src: '/assets/images/sample_portfolio/3.jpg',
            alt: 'Chungking Express 3'
          },
          {
            src: '/assets/images/sample_portfolio/4.jpg',
            alt: 'Chungking Express 4'
          },
          {
            src: '/assets/images/sample_portfolio/5.jpg',
            alt: 'Chungking Express 5'
          }
        ];

        const masonryContainer = document.getElementById('portfolio-masonry');

        if (masonryContainer instanceof HTMLDivElement) {
          const cards = portfolioItems.map((item) => {
            const preparedCaption = prepare(item.alt, CAPTION_FONT);
            const card = document.createElement('article');
            card.className = 'rounded shadow-sm';
            card.style.position = 'absolute';
            card.style.opacity = '0';
            card.style.transition = 'opacity 240ms ease';
            card.style.backgroundColor = 'var(--bs-body-bg)';
            card.style.overflow = 'hidden';

            const image = document.createElement('img');
            image.src = item.src;
            image.alt = item.alt;
            image.decoding = 'async';
            image.style.display = 'block';
            image.style.width = '100%';
            image.style.height = 'auto';

            const body = document.createElement('div');
            body.style.padding = `${CARD_PADDING_TOP}px ${CARD_PADDING_X}px ${CARD_PADDING_BOTTOM}px`;

            const caption = document.createElement('p');
            caption.className = 'mb-0 text-muted';
            caption.textContent = item.alt;
            caption.style.fontSize = '0.875rem';
            caption.style.lineHeight = `${CAPTION_LINE_HEIGHT}px`;
            caption.style.marginTop = `${CAPTION_MARGIN_TOP}px`;

            body.append(caption);
            card.append(image, body);
            masonryContainer.append(card);

            return {
              card,
              image,
              caption,
              preparedCaption,
              naturalWidth: 0,
              naturalHeight: 0
            };
          });

          const loadImageDimensions = (entry) => new Promise((resolve, reject) => {
            const finalize = () => {
              if (entry.image.naturalWidth > 0 && entry.image.naturalHeight > 0) {
                entry.naturalWidth = entry.image.naturalWidth;
                entry.naturalHeight = entry.image.naturalHeight;
                resolve();
              } else {
                reject(new Error(`Failed to load image dimensions for ${entry.image.src}`));
              }
            };

            if (entry.image.complete) {
              finalize();
              return;
            }

            entry.image.addEventListener('load', finalize, { once: true });
            entry.image.addEventListener('error', () => {
              reject(new Error(`Failed to load image ${entry.image.src}`));
            }, { once: true });
          });

          const renderMasonry = () => {
            const containerWidth = masonryContainer.clientWidth;

            if (containerWidth === 0) {
              return;
            }

            const columnCount = window.innerWidth >= 576 ? 2 : 1;
            const totalGap = GAP * (columnCount - 1);
            const columnWidth = (containerWidth - totalGap) / columnCount;
            const captionWidth = columnWidth - CARD_PADDING_X * 2;
            const columnHeights = new Array(columnCount).fill(0);

            cards.forEach((entry) => {
              const imageHeight = columnWidth * (entry.naturalHeight / entry.naturalWidth);
              const captionMetrics = layout(entry.preparedCaption, captionWidth, CAPTION_LINE_HEIGHT);
              const cardHeight = imageHeight + CARD_PADDING_TOP + CAPTION_MARGIN_TOP + captionMetrics.height + CARD_PADDING_BOTTOM;
              const shortestColumnHeight = Math.min(...columnHeights);
              const columnIndex = columnHeights.indexOf(shortestColumnHeight);
              const left = columnIndex * (columnWidth + GAP);
              const top = columnHeights[columnIndex];

              entry.card.style.width = `${columnWidth}px`;
              entry.card.style.left = `${left}px`;
              entry.card.style.top = `${top}px`;
              entry.caption.style.width = `${captionWidth}px`;
              entry.card.style.opacity = '1';

              columnHeights[columnIndex] += cardHeight + GAP;
            });

            masonryContainer.style.height = `${Math.max(...columnHeights.map((height) => height - GAP), 0)}px`;

          };

          const debounce = (callback, delay) => {
            let timeoutId = 0;

            return () => {
              window.clearTimeout(timeoutId);
              timeoutId = window.setTimeout(() => {
                callback();
              }, delay);
            };
          };

          Promise.all([document.fonts.ready, Promise.all(cards.map(loadImageDimensions))])
            .then(() => {
              renderMasonry();
              window.addEventListener('resize', debounce(renderMasonry, 100));
            })
            .catch((error) => {
              console.error(error);
            });
        }
      </script>
    </section>
  </main>

  <footer class="footer mt-auto py-3">
    <div class="container text-center">
      <span class="text-muted small">© 2024 ahh</span>
    </div>
  </footer>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-bs-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
</body>

</html>
