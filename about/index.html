<!DOCTYPE html>
<html lang="ko" data-bs-theme="auto">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About - ahh</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="/assets/css/style.css">
  <script>
    (() => {
      const getPreferredTheme = () => {
        const storedTheme = localStorage.getItem('theme')
        if (storedTheme) return storedTheme
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      }
      document.documentElement.setAttribute('data-bs-theme', getPreferredTheme())
    })()
  </script>
</head>

<body class="d-flex flex-column h-100">
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand p-0" href="/">ahh</a>
      <div class="navbar-nav ms-auto flex-row">
        <a class="nav-link me-3" href="/about/">About</a>
        <a class="nav-link me-3" href="/portfolio/">Portfolio</a>
        <button class="btn btn-link nav-link p-0" id="theme-toggle" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-circle-half"
            viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 0 8 1v14zm0 1A8 8 0 1 1 8 0a8 8 0 0 1 0 16z" />
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="container mt-5 flex-shrink-0">
    <h1 class="fw-bold mb-4">About</h1>

    <style>
      .about-accordion-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        cursor: pointer;
        user-select: none;
      }

      .about-accordion-title {
        margin: 0;
      }

      .about-accordion-indicator {
        flex-shrink: 0;
        font-size: 0.95rem;
        line-height: 1;
        transition: transform 0.3s ease;
      }

      .about-accordion-section[data-open="true"] .about-accordion-indicator {
        transform: rotate(90deg);
      }

      .about-accordion-panel {
        overflow: hidden;
        height: 0;
        transition: height 0.3s ease;
      }

      .about-accordion-inner {
        padding-bottom: 1rem;
      }

      .about-accordion-inner> :last-child {
        margin-bottom: 0;
      }
    </style>

    <section class="mb-5 about-accordion-section" data-accordion-section data-section-key="me" data-open="true">
      <h2 class="h4 fw-bold about-accordion-toggle" data-accordion-toggle aria-expanded="true" role="button" tabindex="0">
        <span class="about-accordion-title">me 😉</span>
        <span class="about-accordion-indicator" aria-hidden="true">▸</span>
      </h2>
      <div class="about-accordion-panel" data-accordion-panel>
        <div class="about-accordion-inner">
          <p>enjoying programming web</p>
        </div>
      </div>
    </section>

    <section class="mb-5 about-accordion-section" data-accordion-section data-section-key="skills" data-open="false">
      <h2 class="h4 fw-bold about-accordion-toggle" data-accordion-toggle aria-expanded="false" role="button" tabindex="0">
        <span class="about-accordion-title">what i can do ✊</span>
        <span class="about-accordion-indicator" aria-hidden="true">▸</span>
      </h2>
      <div class="about-accordion-panel" data-accordion-panel>
        <div class="about-accordion-inner">
          <div class="mt-3"><span class="chip">HTML &amp; CSS</span><span class="chip">JavaScript</span><span class="chip">Python <small class="text-muted">don't ask me</small></span></div>
        </div>
      </div>
    </section>

    <section class="mb-5 about-accordion-section" data-accordion-section data-section-key="contact" data-open="false">
      <h2 class="h4 fw-bold about-accordion-toggle" data-accordion-toggle aria-expanded="false" role="button" tabindex="0">
        <span class="about-accordion-title">contact 📥</span>
        <span class="about-accordion-indicator" aria-hidden="true">▸</span>
      </h2>
      <div class="about-accordion-panel" data-accordion-panel>
        <div class="about-accordion-inner">
          <p><a href="mailto:crag-dune0r@icloud.com" class="text-decoration-none">crag-dune0r@icloud.com</a></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer mt-auto py-3">
    <div class="container text-center">
      <span class="text-muted small">© 2024 ahh</span>
    </div>
  </footer>

  <script type="module">
    import { prepare, layout } from '/assets/js/pretext.js';

    const TEXT_FONT = '500 16px "Pretendard Variable"';
    const TEXT_LINE_HEIGHT = 25.6;
    const SECTION_PADDING_BOTTOM = 16;
    const CHIP_ROW_HEIGHT = 32;
    const CHIP_ROW_GAP = 8;
    const CHIP_TOP_MARGIN = 16;
    const CHIP_LAYOUT_PADDING = 8;
    const CONTAINER_MAX_WIDTH = 672;
    const CONTAINER_HORIZONTAL_PADDING = 24;

    const sections = Array.from(document.querySelectorAll('[data-accordion-section]')).map((section) => ({
      element: section,
      toggle: section.querySelector('[data-accordion-toggle]'),
      panel: section.querySelector('[data-accordion-panel]'),
      key: section.dataset.sectionKey || '',
      isOpen: section.dataset.open === 'true',
    }));

    const preparedContent = {
      me: prepare('enjoying programming web', TEXT_FONT),
      skills: prepare('HTML & CSS JavaScript Python don\'t ask me', TEXT_FONT),
      contact: prepare('crag-dune0r@icloud.com', TEXT_FONT),
    };

    function getContentWidth() {
      return Math.max(0, Math.min(CONTAINER_MAX_WIDTH, window.innerWidth - CONTAINER_HORIZONTAL_PADDING));
    }

    function getChipHeight(width) {
      const chipLayout = layout(preparedContent.skills, Math.max(1, width), TEXT_LINE_HEIGHT);
      const estimatedRows = Math.max(1, chipLayout.lineCount || 1);
      return CHIP_TOP_MARGIN + (estimatedRows * CHIP_ROW_HEIGHT) + ((estimatedRows - 1) * CHIP_ROW_GAP) + CHIP_LAYOUT_PADDING;
    }

    function getExpandedHeight(section) {
      const width = getContentWidth();
      if (!width) {
        return 0;
      }

      if (section.key === 'skills') {
        return getChipHeight(width) + SECTION_PADDING_BOTTOM;
      }

      const content = section.key === 'contact' ? preparedContent.contact : preparedContent.me;
      return layout(content, width, TEXT_LINE_HEIGHT).height + SECTION_PADDING_BOTTOM;
    }

    function syncSection(section) {
      section.element.dataset.open = String(section.isOpen);
      section.toggle.setAttribute('aria-expanded', String(section.isOpen));
      section.panel.style.height = section.isOpen ? `${getExpandedHeight(section)}px` : '0px';
    }

    function recalculateHeights() {
      sections.forEach((section) => {
        if (section.isOpen) {
          section.panel.style.height = `${getExpandedHeight(section)}px`;
        }
      });
    }

    function toggleSection(section) {
      section.isOpen = !section.isOpen;
      syncSection(section);
    }

    sections.forEach((section) => {
      section.toggle.addEventListener('click', () => {
        toggleSection(section);
      });

      section.toggle.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          toggleSection(section);
        }
      });
    });

    await document.fonts.ready;
    sections.forEach((section) => {
      syncSection(section);
    });

    window.addEventListener('resize', () => {
      recalculateHeights();
    });
  </script>

  <script>
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-bs-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
</body>

</html>
