<!DOCTYPE html>
<html lang="ko" data-bs-theme="auto">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ahh - insanities</title>
  <meta name="description" content="insanities">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="/assets/css/style.css">
  <script>
    (() => {
      const getPreferredTheme = () => {
        const storedTheme = localStorage.getItem('theme')
        if (storedTheme) return storedTheme
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      }
      document.documentElement.setAttribute('data-bs-theme', getPreferredTheme())
    })()
  </script>
</head>

<body class="d-flex flex-column h-100">
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand p-0" href="/">ahh</a>
      <div class="navbar-nav ms-auto flex-row">
        <a class="nav-link me-3" href="/about/">About</a>
        <a class="nav-link me-3" href="/portfolio/">Portfolio</a>
        <button class="btn btn-link nav-link p-0" id="theme-toggle" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-circle-half"
            viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 0 8 1v14zm0 1A8 8 0 1 1 8 0a8 8 0 0 1 0 16z" />
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="container flex-shrink-0">
    <div id="virtual-list-viewport" style="min-height: 80vh; position: relative;">
      <div id="virtual-list-spacer"></div>
      <div id="virtual-list-content" style="position: absolute; top: 0; left: 0; width: 100%;"></div>
    </div>
  </main>

  <footer class="footer mt-auto py-3">
    <div class="container text-center">
      <div class="footer-links mb-2">
        <a href="https://github.com/stevenahhh" class="footer-icon-links">GitHub</a>
        <a href="mailto:steve@example.com" class="footer-icon-links">Email</a>
      </div>
      <span class="text-muted small">© 2024 ahh</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { prepare, layout } from '/assets/js/pretext.js';

    const TITLE_FONT = '500 20px "Pretendard Variable"';
    const YEAR_FONT = '600 32px "Pretendard Variable"';
    const TITLE_LINE_HEIGHT = 32;
    const YEAR_LINE_HEIGHT = 38.4;
    const DATE_LINE_HEIGHT = 22.4;
    const DATE_WIDTH = 100;
    const POST_MARGIN_BOTTOM = 8;
    const YEAR_MARGIN_TOP = 32;
    const YEAR_MARGIN_BOTTOM = 16;
    const OVERSCAN = 300;

    const viewport = document.getElementById('virtual-list-viewport');
    const spacer = document.getElementById('virtual-list-spacer');
    const content = document.getElementById('virtual-list-content');
    const themeToggle = document.getElementById('theme-toggle');

    let allItems = [];
    let offsets = [];
    let totalHeight = 0;
    let currentLayoutWidth = 0;

    function createItems(posts) {
      const items = [];
      let currentYear = null;

      posts.forEach((post) => {
        if (post.year !== currentYear) {
          currentYear = post.year;
          items.push({
            type: 'header',
            content: currentYear,
            prepared: prepare(String(currentYear), YEAR_FONT),
            height: 0,
          });
        }

        items.push({
          type: 'post',
          content: post,
          prepared: prepare(post.title, TITLE_FONT),
          height: 0,
        });
      });

      return items;
    }

    function getContainerWidth() {
      return Math.max(0, viewport.clientWidth || viewport.getBoundingClientRect().width || 0);
    }

    function updateOffsets() {
      offsets = new Array(allItems.length);
      let runningOffset = 0;

      for (let i = 0; i < allItems.length; i += 1) {
        offsets[i] = runningOffset;
        runningOffset += allItems[i].height;
      }

      totalHeight = runningOffset;
      spacer.style.height = `${totalHeight}px`;
    }

    function recalculateLayout() {
      const containerWidth = getContainerWidth();
      if (!containerWidth) {
        return;
      }

      currentLayoutWidth = containerWidth;
      const titleWidth = Math.max(0, containerWidth - DATE_WIDTH);

      allItems.forEach((item) => {
        if (item.type === 'header') {
          const headerLayout = layout(item.prepared, containerWidth, YEAR_LINE_HEIGHT);
          item.height = headerLayout.height + YEAR_MARGIN_TOP + YEAR_MARGIN_BOTTOM;
          return;
        }

        const titleLayout = layout(item.prepared, titleWidth, TITLE_LINE_HEIGHT);
        item.height = Math.max(titleLayout.height, DATE_LINE_HEIGHT) + POST_MARGIN_BOTTOM;
      });

      updateOffsets();
    }

    function findStartIndex(targetOffset) {
      let low = 0;
      let high = allItems.length - 1;
      let result = allItems.length;

      while (low <= high) {
        const mid = Math.floor((low + high) / 2);
        const itemBottom = offsets[mid] + allItems[mid].height;

        if (itemBottom > targetOffset) {
          result = mid;
          high = mid - 1;
        } else {
          low = mid + 1;
        }
      }

      return result;
    }

    function render() {
      if (!allItems.length || !currentLayoutWidth) {
        return;
      }

      const scrollTop = window.scrollY;
      const viewportHeight = window.innerHeight;
      const viewportOffset = viewport.offsetTop;
      const relativeScrollTop = Math.max(0, scrollTop - viewportOffset);
      const startOffset = Math.max(0, relativeScrollTop - OVERSCAN);
      const endOffset = relativeScrollTop + viewportHeight + OVERSCAN;
      const startIndex = findStartIndex(startOffset);

      let endIndex = startIndex;
      while (endIndex < allItems.length && offsets[endIndex] < endOffset) {
        endIndex += 1;
      }

      const firstVisibleOffset = startIndex < offsets.length ? offsets[startIndex] : totalHeight;
      content.innerHTML = '';
      content.style.transform = `translateY(${firstVisibleOffset}px)`;

      for (let i = startIndex; i < endIndex; i += 1) {
        const item = allItems[i];
        const div = document.createElement('div');
        div.className = 'virtual-item';
        div.style.height = `${item.height}px`;

        if (item.type === 'header') {
          div.innerHTML = `<h1 class="archive-year">${item.content}</h1>`;
        } else {
          div.innerHTML = `
                        <div class="archive-item">
                            <a href="${item.content.url}" class="archive-title">${item.content.title}</a>
                            <span class="archive-date text-muted font-monospace">${item.content.date}</span>
                        </div>
                    `;
        }

        content.appendChild(div);
      }
    }

    function handleResize() {
      const nextWidth = getContainerWidth();
      if (!nextWidth || nextWidth === currentLayoutWidth) {
        render();
        return;
      }

      recalculateLayout();
      render();
    }

    async function init() {
      try {
        const response = await fetch('/assets/data/posts.json');
        const posts = await response.json();

        if (document.fonts?.ready) {
          await document.fonts.ready;
        }

        posts.sort((a, b) => new Date(b.date) - new Date(a.date));
        allItems = createItems(posts);
        recalculateLayout();

        window.addEventListener('scroll', render, { passive: true });
        window.addEventListener('resize', handleResize);

        render();
      } catch (e) {
        console.error('Failed to load posts', e);
      }
    }

    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-bs-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-bs-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });

    init();
  </script>
</body>

</html>
